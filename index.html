<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panini FIFA World Cup 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;padding:0 0 3rem}
.container{max-width:780px;margin:0 auto;padding:0 1rem}
.header{padding:1.25rem 0 .75rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-bottom:1px solid #e0ddd5;margin-bottom:1rem}
.title{font-size:20px;font-weight:600;color:#1a1a1a}

.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0;transition:background .3s}
.sync-dot.online{background:#1D9E75}
.sync-dot.syncing{background:#EF9F27;animation:pulse 1s infinite}
.sync-dot.offline{background:#E24B4A}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-user{font-weight:600;color:#1a1a1a}
.sync-status{color:#888}
.stats{display:flex;gap:8px;flex-wrap:wrap}
.stat{background:#fff;border:0.5px solid #ddd;border-radius:8px;padding:6px 12px;font-size:13px;color:#666}
.stat b{color:#1a1a1a;font-weight:600}
.stat.green b{color:#0f6e56}
.stat.amber b{color:#854f0b}
.stat.red b{color:#a32d2d}
.tabs{display:flex;gap:0;border-bottom:1px solid #e0ddd5;margin-bottom:1rem}
.tab{padding:8px 18px;font-size:13px;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;transition:all .15s;font-family:inherit}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:600}
.tab:hover:not(.active){color:#333}
.toolbar{display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.toolbar input{flex:1;min-width:140px;font-size:13px;padding:7px 12px;border:0.5px solid #ccc;border-radius:8px;font-family:inherit;outline:none}
.toolbar input:focus{border-color:#888}
.toolbar select{font-size:13px;padding:7px 10px;border:0.5px solid #ccc;border-radius:8px;font-family:inherit;background:#fff;outline:none}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{font-size:12px;padding:4px 12px;border:0.5px solid #ccc;border-radius:20px;background:#fff;cursor:pointer;color:#666;transition:all .15s;font-family:inherit}
.filter-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.teams-grid{display:flex;flex-direction:column;gap:10px}
.team-card{background:#fff;border:0.5px solid #ddd;border-radius:12px;overflow:hidden}
.team-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none}
.team-header:hover{background:#fafaf8}
.team-name{font-size:14px;font-weight:600;color:#1a1a1a;display:flex;align-items:center;gap:8px}
.team-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:#e6f1fb;color:#185fa5}
.team-right{display:flex;align-items:center;gap:10px}
.team-pct{font-size:12px;color:#888}
.progress-bar{height:4px;background:#e8e8e4;border-radius:2px;width:70px}
.progress-fill{height:4px;border-radius:2px;background:#1D9E75;transition:width .3s}
.chevron{font-size:11px;color:#aaa}
.stickers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(54px,1fr));gap:5px;padding:10px 12px;border-top:0.5px solid #eee}
.sticker{border:0.5px solid #ddd;border-radius:6px;padding:4px 2px;text-align:center;cursor:pointer;transition:all .15s;position:relative;user-select:none;min-height:62px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;background:#fafaf8}
.sticker:hover{border-color:#aaa;background:#f0f0ec}
.sticker.owned{background:#eaf3de;border-color:#639922}
.sticker.doubled{background:#faeeda;border-color:#BA7517}
.sticker.foil{border-color:#EF9F27;border-width:1.5px}
.sticker.foil.owned{border-color:#3B6D11}
.sticker.foil.doubled{border-color:#854f0b}
.s-seq{font-size:9px;color:#aaa;line-height:1}
.sticker.owned .s-seq{color:#3B6D11;opacity:.8}
.sticker.doubled .s-seq{color:#854f0b;opacity:.8}
.s-code{font-size:11px;font-weight:600;color:#333;line-height:1}
.sticker.owned .s-code{color:#3B6D11}
.sticker.doubled .s-code{color:#854f0b}
.foil-star{font-size:8px;line-height:1}
.dup-badge{position:absolute;top:-5px;right:-5px;background:#BA7517;color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1}
.dup-controls{display:flex;align-items:center;gap:2px;margin-top:2px}
.dup-btn{width:17px;height:17px;border:0.5px solid #ccc;border-radius:3px;background:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#666;line-height:1;flex-shrink:0;font-family:inherit}
.dup-btn:hover{background:#eee}
.dup-count{font-size:10px;font-weight:600;color:#333;min-width:12px;text-align:center}
.list-section{padding:.25rem 0}
.list-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid #eee}
.list-row:last-child{border-bottom:none}
.list-main{font-size:13px;color:#1a1a1a;font-weight:500}
.list-sub{font-size:11px;color:#888}
.list-right{display:flex;align-items:center;gap:6px}
.qty-badge{font-size:12px;font-weight:600;color:#854f0b}
.add-btn{font-size:12px;padding:4px 12px;cursor:pointer;border:0.5px solid #ccc;border-radius:8px;background:#fff;color:#555;font-family:inherit}
.add-btn:hover{background:#f0f0ec}
.empty{text-align:center;padding:2.5rem;color:#aaa;font-size:14px}
.sec-label{font-size:13px;font-weight:600;color:#666;margin:12px 0 8px}
/* Modal de nombre */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999}
.modal{background:#fff;border-radius:16px;padding:2rem;max-width:340px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal h2{font-size:18px;font-weight:600;margin-bottom:.5rem}
.modal p{font-size:13px;color:#666;margin-bottom:1.25rem}

.modal input:focus{border-color:#888}
.modal button{width:100%;padding:10px;font-size:14px;font-weight:600;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit}
.modal button:hover{background:#333}
</style>
</head>

function buildInitialCopies(){
  const c = {};
  ownedList.forEach(n=>{c[n]=1;});
  doublesList.forEach(n=>{c[n]=(c[n]||0)+1;});
  return c;
}

function teamOf(gn){return TEAMS.find(t=>gn>=t.s&&gn<t.s+t.c);}
function codeOf(gn){const t=teamOf(gn);if(!t)return'#'+gn;return t.p+(gn-t.s+1);}
function isFoil(t,pos){if(t.p==='FWC')return false;return pos===1||pos===13;}

function setSyncStatus(state, msg){
  const dot = document.getElementById('sync-dot');
  const status = document.getElementById('sync-status');
  dot.className = 'sync-dot ' + state;
  status.textContent = '— ' + msg;
}

function updateStats(){
  const owned = Object.values(copies).filter(v=>v>=1).length;
  const dups = Object.values(copies).filter(v=>v>1).length;
  document.getElementById('st-owned').textContent = owned;
  document.getElementById('st-dups').textContent = dups;
  document.getElementById('st-miss').textContent = 980 - owned;
}

async function saveToFirebase(gn, value){
  setSyncStatus('syncing','guardando...');
  try {
    const updates = {};
    updates['album/copies/' + gn] = value;
    updates['album/lastEdit'] = { user: userName, sticker: gn, value, time: Date.now() };
    await update(ref(db), updates);
    setSyncStatus('online','sincronizado ✓');
  } catch(e) {
    setSyncStatus('offline','error al guardar');
    console.error(e);
  }
}

function toggleSticker(gn){
  const c = copies[gn]||0;
  let newVal;
  if(c===0) newVal=1;
  else if(c===1) newVal=2;
  else newVal=null;
  if(newVal===null) delete copies[gn];
  else copies[gn]=newVal;
  updateStats(); renderAlbum(); renderDups(); renderMiss();
  saveToFirebase(gn, newVal===null ? 0 : newVal);
}

function adjCopies(gn, d, e){
  if(e&&e.stopPropagation) e.stopPropagation();
  const c = copies[gn]||0;
  if(c===0) return;
  const nc = Math.max(1, c+d);
  copies[gn] = nc;
  updateStats(); renderAlbum(); renderDups();
  saveToFirebase(gn, nc);
}

function markOwned(gn){
  if(!(copies[gn]>=1)) copies[gn]=1;
  updateStats(); renderAlbum(); renderMiss();
  saveToFirebase(gn, 1);
}

  stickerFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

    const pct=Math.round(ownedCnt/stickers.length*100);
    if(q){
      const tm=team.n.toLowerCase().includes(q)||team.p.toLowerCase().includes(q);
      const cm=stickers.some(s=>s.code.toLowerCase().includes(q)||String(s.gn).includes(q));
      if(!tm&&!cm)return;
    }
    if(fs==='complete'&&ownedCnt<stickers.length)return;
    if(fs==='incomplete'&&ownedCnt===stickers.length)return;
    const isCol=collapsed[ti];
    const filtered=stickers.filter(s=>{
      const c=copies[s.gn]||0;
      if(stickerFilter==='owned')return c>=1;
      if(stickerFilter==='doubled')return c>1;
      if(stickerFilter==='missing')return c===0;
      return true;
    });
    html+=`<div class="team-card">
      <div class="team-header" onclick="window._toggleCol(${ti})">
        <div class="team-name"><span class="team-badge">${team.p}</span>${team.n}</div>
        <div class="team-right">
          <span class="team-pct">${ownedCnt}/${stickers.length}</span>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <span class="chevron">${isCol?'▼':'▲'}</span>
        </div>
      </div>`;
    if(!isCol){
      html+=`<div class="stickers-grid">`;
      filtered.forEach(s=>{
        const c=copies[s.gn]||0;
        const isDup=c>1, isOwned=c===1;
        let cls='sticker'+(isDup?' doubled':isOwned?' owned':'')+(s.foil?' foil':'');
        html+=`<div class="${cls}" onclick="window._toggle(${s.gn})" title="${s.code} — #${s.gn}">
          ${isDup?`<div class="dup-badge">${c}</div>`:''}
          <div class="s-seq">#${s.gn}</div>
          <div class="s-code">${s.code}</div>
          ${s.foil?'<span class="foil-star">✨</span>':''}`;
        if(c>=1){
          html+=`<div class="dup-controls">
            <button class="dup-btn" onclick="window._adj(${s.gn},-1,event)">−</button>
            <span class="dup-count">${c}</span>
            <button class="dup-btn" onclick="window._adj(${s.gn},1,event)">+</button>
          </div>`;
        }
        html+=`</div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  grid.innerHTML=html||'<div class="empty">No se encontraron equipos.</div>';
}

function renderDups(){
  const list=document.getElementById('dups-list');
  const title=document.getElementById('dups-title');
  if(!list)return;
  let items=[];
  Object.entries(copies).forEach(([gn,c])=>{
    if(c>1){gn=parseInt(gn);const t=teamOf(gn);items.push({gn,code:codeOf(gn),copies:c,team:t?t.n:''});}
  });
  items.sort((a,b)=>a.gn-b.gn);
  title.textContent=`Estampas duplicadas (${items.length})`;
  if(!items.length){list.innerHTML='<div class="empty">No tienes duplicados.</div>';return;}
  list.innerHTML='<div class="list-section">'+items.map(it=>`
    <div class="list-row">
      <div>
        <div class="list-main">${it.code} <span style="color:#aaa;font-size:11px">— #${it.gn}</span></div>
        <div class="list-sub">${it.team}</div>
      </div>
      <div class="list-right">
        <span class="qty-badge">${it.copies} copias</span>
        <button class="dup-btn" style="width:22px;height:22px" onclick="window._adj(${it.gn},-1,event)">−</button>
        <button class="dup-btn" style="width:22px;height:22px" onclick="window._adj(${it.gn},1,event)">+</button>
      </div>
    </div>`).join('')+'</div>';
}

function renderMiss(){
  const list=document.getElementById('miss-list');
  const title=document.getElementById('miss-title');
  if(!list)return;
  let items=[];
  TEAMS.forEach(team=>{
    for(let p=1;p<=team.c;p++){
      const gn=team.s+p-1;
      if(!(copies[gn]>=1))items.push({gn,code:team.p+p,team:team.n});
    }
  });
  title.textContent=`Estampas que faltan (${items.length})`;
  if(!items.length){list.innerHTML='<div class="empty">¡Álbum completo! 🎉</div>';return;}
  list.innerHTML='<div class="list-section">'+items.map(it=>`
    <div class="list-row">
      <div>
        <div class="list-main">${it.code} <span style="color:#aaa;font-size:11px">— #${it.gn}</span></div>
        <div class="list-sub">${it.team}</div>
      </div>
      <button class="add-btn" onclick="window._markOwned(${it.gn})">+ Tengo</button>
    </div>`).join('')+'</div>';
}

function switchTab(tab){
  ['album','dups','missing'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===tab?'block':'none';
  });
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['album','dups','missing'][i]===tab);
  });
  if(tab==='dups')renderDups();
  if(tab==='missing')renderMiss();
}

// Exponer funciones al HTML (necesario con type=module)
window.switchTab = switchTab;
window.setFilter = setFilter;
window._toggle = toggleSticker;
window._adj = adjCopies;
window._markOwned = markOwned;
window._toggleCol = (ti)=>{ collapsed[ti]=!collapsed[ti]; renderAlbum(); };

window.startApp = async function(){
  const input = document.getElementById('username-input');
  const name = input.value.trim();
  if(!name){ input.focus(); return; }
  userName = name;
  document.getElementById('sync-user').textContent = name;
  document.getElementById('modal').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  setSyncStatus('syncing', 'conectando...');

  // Cargar datos de Firebase; si no hay nada, subir los iniciales
  const snapshot = await get(copiesRef);
  if(snapshot.exists()){
    const data = snapshot.val();
    copies = {};
    Object.entries(data).forEach(([k,v])=>{ if(v>0) copies[parseInt(k)]=v; });
    setSyncStatus('online','sincronizado ✓');
  } else {
    // Primera vez: subir datos iniciales
    copies = buildInitialCopies();
    const payload = {};
    Object.entries(copies).forEach(([k,v])=>{ payload[k]=v; });
    await update(copiesRef, payload);
    setSyncStatus('online','datos iniciales cargados ✓');
  }

  updateStats(); renderAlbum();

  // Escuchar cambios en tiempo real
  onValue(copiesRef, (snap)=>{
    if(!snap.exists()) return;
    const data = snap.val();
    copies = {};
    Object.entries(data).forEach(([k,v])=>{ if(v>0) copies[parseInt(k)]=v; });
    updateStats(); renderAlbum();
    if(document.getElementById('tab-dups').style.display!=='none') renderDups();
    if(document.getElementById('tab-missing').style.display!=='none') renderMiss();
  });

  // Mostrar quién hizo el último cambio
  onValue(lastEditRef, (snap)=>{
    if(!snap.exists()) return;
    const {user, sticker, time} = snap.val();
    if(user && user !== userName){
      const code = codeOf(sticker);
      const hace = Math.round((Date.now()-time)/1000);
      setSyncStatus('online', `${user} actualizó ${code} hace ${hace}s`);
    }
  });
};

// Enter en el input del modal
document.getElementById('username-input').addEventListener('keydown', e=>{
  if(e.key==='Enter') window.startApp();
});
</script>
